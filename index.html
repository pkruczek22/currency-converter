<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator walut</title>
  <link rel="icon" href="images/icon.png">
  <meta property="og:image" content="images/share.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="css/style.css" rel="stylesheet">
  <link href="css/formStyle.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;1,400;1,700&display=swap" rel="stylesheet">
  <script defer src="js/script.js"></script>
</head>

<body class="body">
  <h1 class="mainHeader"> Kalkulator walut</h1>
  <div class="container">
    <p class="information">Pola wymagane oznaczone są *.</p>
    <form class="form js-formElement">
      <fieldset class="form__fieldset">
        <legend class="form__legend">Wpisz dane do obliczeń</legend>
        <div class="form__container">
          <p>
            <label class="form__label">
              <span class="form__labelText">Kwota*:</span><input class="form__field js-amountElement" type="number"
                name="amount" placeholder="Wpisz kwotę w PLN" autofocus required min="0" step="0.01">
            </label>
          </p>
          <p>
            <label class="form__label">
              <span class="form__labelText">Waluta*:</span><select class="form__field js-currencyElement"
                name="currency">
                <option>EUR</option>
                <option>USD</option>
                <option>GBP</option>
                <option>CZK</option>
              </select>
            </label>
          </p>
        </div>
      </fieldset>
      <p>
        <button class="button js-button">Przelicz!</button>
      </p>
      <fieldset class="form__fieldset form__fieldset--hidden js-hiddenFieldset">
        <legend class="form__legend">Wynik przeliczenia PLN na <span class="js-currencySymbol"></span></legend>
        <div class="form__container">
          <p>
            <label class="form__label">
              <span class="form__labelText">Kwota w <span class="js-currencySymbol"></span>:</span><input
                class="form__field form__field--result js-resultElement" type="number" name="result" readonly>
            </label>
          </p>
          <p>
            <label class="form__label">
              <span class="form__labelText">Kurs:</span><input class="form__field js-rateElement" name="rate" readonly>
            </label>
          </p>
          <p class="form__rateInformation">
            Zastosowano kurs Narodowego Banku Polskiego z <strong>tabeli nr 141/A/NBP/2022 z dnia 2022-07-22</strong>.
          </p>
        </div>
      </fieldset>
    </form>
  </div>
</body>

</html>
