<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator walut</title>
  <link rel="icon" href="images/icon.png">
  <meta property="og:image" content="images/share.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="css/style.css" rel="stylesheet">
  <link href="css/formStyle.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;1,400;1,700&display=swap" rel="stylesheet">
  <script defer src="js/script.js"></script>
</head>

<body class="body">
  <div class="container">
    <p class="information">Pola wymagane oznaczone są *.</p>
    <form class="form js-formElement">
      <fieldset class="form__fieldset">
        <legend class="form__legend">Kalkulator walut</legend>
        <div class="form__container">
          <label class="form__label">
            <span class="form__labelText">Kwota*:</span>
            <input class="form__field js-amountElement" type="number" name="amount" placeholder="Wpisz kwotę w PLN"
              autofocus required min="0" step="0.01">
          </label>
          <label class="form__label">
            <span class="form__labelText">Waluta*:</span>
            <select class="form__field js-currencyElement" name="currency">
              <option>EUR</option>
              <option>USD</option>
              <option>GBP</option>
              <option>CZK</option>
            </select>
          </label>
        </div>
        <p class="buttonContainer">
          <button class="button js-button">Przelicz!</button>
        </p>
        <div class="form__container form__container--hidden js-hiddenContainer">
          <p class="form__resultField">
            <span class="form__labelText form__labelText--result">Kwota w <span
                class="js-currencySymbol"></span>:</span>
            <span class="form__resultField js-resultElement"></span>
          </p>
          <p class="form__resultField">
            <span class="form__labelText form__labelText--result">Kurs:</span>
            <span class="form__resultField js-rateElement"></span>
          </p>
          <p class="form__rateInformation">
            Zastosowano kurs Narodowego Banku Polskiego z <strong>tabeli nr 141/A/NBP/2022 z dnia 2022-07-22</strong>.
          </p>
        </div>
      </fieldset>
    </form>
  </div>
</body>

</html>
